<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17191b" />
    <title>Storm Forge · Sin conexión</title>
    <style>
      * { box-sizing: border-box; }
      body { min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; color: #f6f3ea; background: #111416; font-family: system-ui, sans-serif; text-align: center; }
      main { max-width: 420px; padding: 30px; border: 1px solid #705b2c; border-radius: 12px; background: #201e1c; }
      img { width: 92px; height: 92px; }
      h1 { margin: 18px 0 8px; text-transform: uppercase; }
      p { color: #cbc4b7; line-height: 1.55; }
      button { padding: 12px 18px; border: 0; border-radius: 4px; color: #fff; background: #8e2018; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa-icon.svg" alt="" />
      <h1>Sin conexión</h1>
      <p>Abre Storm Forge una vez con conexión para guardar la aplicación completa en este dispositivo.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
